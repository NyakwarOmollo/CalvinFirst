<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="signuplogin.css">
    <title>Sign Up - KickHub</title>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-shoe-prints"></i>
            KickHub
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Shop</a>
            <a href="login.html" class="active">Login</a>
        </div>
    </nav>

    <!-- SIGNUP FORM -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>Join KickHub and get exclusive offers</p>

            <form class="auth-form">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" required placeholder="Calvin">
                </div>

                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" required placeholder="Ochieng">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="calvin_kicks">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="calvin@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="••••••••">
                </div>

                <button type="submit" class="auth-btn">Sign Up</button>

                <p class="switch-link">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 KickHub. Developed by Calvin Ochieng</p>
    </footer>

</body>
</html>
