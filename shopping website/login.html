<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="signuplogin.css">
    <title>Login - KickHub</title>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-shoe-prints"></i>
            KickHub
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Shop</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your KickHub account</p>

            <form class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required placeholder="calvin_kicks or calvin@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn">Login</button>

                <p class="switch-link">
                    Don't have an account? <a href="signup.html">Sign up here</a>
                </p>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 KickHub. Developed by Calvin Ochieng</p>
    </footer>

</body>
</html>
